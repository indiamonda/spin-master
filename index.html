  <script>
        window["GD_OPTIONS"] = {                    
          "gameId": "ec9b26b674fc4c13940418c3632d2f5b",
          "onEvent": function(event) {
              switch (event.name) {
                  case "SDK_GAME_START":
                      // advertisement done, resume game logic and unmute audio
                      cc && cc.audioEngine.resumeAll();
                      cc && cc.game.resume();
                      break;
                  case "SDK_GAME_PAUSE":
                      // pause game logic / mute audio
                      cc && cc.audioEngine.pauseAll();   
                      cc && cc.game.pause();
                      break;
                  case "SDK_GDPR_TRACKING":
                      // this event is triggered when your user doesn't want to be tracked
                      break;
                  case "SDK_GDPR_TARGETING":
                      // this event is triggered when your user doesn't want personalised targeting of ads and such
                      break;
                  case "AD_SDK_REQUEST_ADS":
                      break;
                  case "AD_SDK_FINISHED":

                      break;
                  case "AD_SDK_ERROR":
                  case "AD_CANCELED":
                      
                      break;
                  case "SDK_READY":
                      break;
                  case "SDK_REWARDED_WATCH_COMPLETE":
                      if(cc.sdkMgr !== 'undefined')
                        cc.sdkMgr.finishReward();
                      break;
              }
          },
        };
        (function(d, s, id) {
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) return;
            js = d.createElement(s);
            js.id = id;
            js.src = 'https://html5.api.gamedistribution.com/main.min.js';
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'gamedistribution-jssdk'));
    </script>

<script type="text/javascript">
(function () {
    // open web debugger console
    if (typeof VConsole !== 'undefined') {
        window.vConsole = new VConsole();
    }

    var splash = document.getElementById('splash');
    splash.style.display = 'block';

    var cocos2d = document.createElement('script');
    cocos2d.async = true;
    cocos2d.src = window._CCSettings.debug ? 'cocos2d-js.js' : 'cocos2d-js-min.18615.js';

    var engineLoaded = function () {
        document.body.removeChild(cocos2d);
        cocos2d.removeEventListener('load', engineLoaded, false);
          console.log("minigame init success");
          window.boot();
      };
      cocos2d.addEventListener('load', engineLoaded, false);
      document.body.appendChild(cocos2d);
    })();
</script>
